{% extends "base.html" %}
{% load static %}

{% block title %}Encrypt Image | StegoEncrypt{% endblock %}

{% block extra_head %}
<style>
  .form-container {
    max-width: 750px;
    margin: auto;
    background-color: #1e293b;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 12px 24px rgba(96, 165, 250, 0.15);
    border: 1px solid #334155;
    color: #e2e8f0;
  }
  h2 {
    text-align: center;
    color: #60a5fa;
    font-weight: 700;
    text-shadow: 0 0 6px rgba(96, 165, 250, 0.4);
    margin-bottom: 30px;
  }
  label {
    color: #cbd5e1;
  }
  .form-control {
    background-color: #0f172a;
    color: #e2e8f0;
    border: 1px solid #334155;
  }
  .btn-custom {
    background-color: #60a5fa;
    color: #0f172a;
    font-weight: 600;
    border-radius: 30px;
  }
</style>
{% endblock %}

{% block content %}
<div class="form-container mt-5">
  <h2>🔐 Encrypt Your Image</h2>

  {% if message %}
    <div class="alert alert-info text-center">{{ message }}</div>
  {% endif %}

 <form method="POST" enctype="multipart/form-data" autocomplete="off">
    {% csrf_token %}
    <div class="mb-3">
      <label for="image">Select Image</label>
      <input type="file" name="image" accept="image/*" class="form-control" required>
    </div>

    

    <div class="mb-3">
      <label for="text">Secret Message</label>
      <input type="text" name="text" placeholder="Enter secret message" class="form-control" required>
    </div>

    <div class="mb-4">
      <label for="key">Encryption Key</label>
      <input type="password" name="key" placeholder="Enter encryption key" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-custom w-100">Encrypt Image</button>
  </form>
</div>
{% endblock %}
