{% extends 'base.html' %}

{% block title %}Result{% endblock %}

{% block content %}
    <h2>Encrypted Image Result</h2>
    {% if encrypted_image_url %}
        <img src="{{ encrypted_image_url }}" alt="Encrypted Image" width="400">
        <p><a href="{{ encrypted_image_url }}" download>Download Image</a></p>
    {% else %}
        <p>No image to display.</p>
    {% endif %}
    <br>
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>
{% endblock %}
