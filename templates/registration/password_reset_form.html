{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h3 class="mt-4">Reset your password</h3>
  <form method="POST">
    {% csrf_token %}
    {{ form.email.label_tag }}
    {{ form.email }}
    <button type="submit" class="btn btn-primary mt-2">Send Reset Email</button>
  </form>
</div>
{% endblock %}
