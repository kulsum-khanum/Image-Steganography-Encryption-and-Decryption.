{% extends 'base.html' %}
{% block title %}Login | StegoEncrypt{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: 'Poppins', sans-serif;
    }

    .card-login {
        background: #0f172a;
        border-radius: 20px;
        border: 2px solid #3b82f6;
        box-shadow: 0 0 20px #3b82f6a0;
        padding: 2rem;
        color: #e2e8f0;
    }

    .form-label {
        font-weight: 500;
        color: #e2e8f0;
    }

    .form-control {
        background-color: #1e293b;
        border: 1px solid #60a5fa;
        color: #e2e8f0;
    }

    .form-control:focus {
        background-color: #0f172a;
        color: #fff;
        border-color: #38bdf8;
        box-shadow: 0 0 10px #38bdf8;
    }

    .btn-primary {
        background-color: #3b82f6;
        border: none;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px #3b82f6a0;
    }

    .btn-primary:hover {
        background-color: #2563eb;
        box-shadow: 0 0 20px #2563eba0;
    }

    .eye-icon {
        position: absolute;
        top: 50%;
        right: 15px;
        transform: translateY(-50%);
        color: #60a5fa;
        cursor: pointer;
    }

    .login-links {
        text-align: center;
        margin-top: 1.5rem;
    }

    .login-links a {
        color: #60a5fa;
        font-weight: 500;
        text-decoration: none;
    }

    .login-links a:hover {
        text-decoration: underline;
        color: #93c5fd;
    }

    h2 i {
        color: #38bdf8;
        margin-right: 10px;
    }
</style>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="col-md-6">
        <div class="card card-login text-center">
            <h2 class="mb-4"><i class="fas fa-shield-alt"></i>Login to StegoEncrypt</h2>

      {% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endfor %}
{% endif %}



            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label for="username" class="form-label"><i class="fas fa-user me-2 text-info"></i>Username</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="mb-4 position-relative text-start">
                    <label for="password" class="form-label"><i class="fas fa-lock me-2 text-info"></i>Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
                    <span class="eye-icon" onclick="togglePassword('password')"><i class="fas fa-eye"></i></span>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
            </form>

            <div class="login-links">
                <p><a href="{% url 'password_reset' %}"><i class="fas fa-key me-1"></i>Forgot Password?</a></p>
                <p>Don’t have an account? <a href="{% url 'register' %}"><i class="fas fa-user-plus me-1"></i>Register here</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
